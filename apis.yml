aid: kobo360
name: Kobo360
description: >-
  Kobo360 is a Nigerian-founded, pan-African B2B digital freight marketplace
  and logistics technology platform headquartered in Lagos, with operations
  across Nigeria, Ghana, Kenya, Togo, Uganda, and other African countries.
  Founded in 2017 by Obi Ozor and Ife Oyedele II, Kobo360 operates an
  "Uber for trucks" long-haul logistics model that matches cargo owners and
  enterprise shippers with truck owners and drivers through a single
  digital ecosystem. The company runs the Global Logistics Operating System
  (G-LOS), an enterprise-grade logistics SaaS / digital freight forwarding
  platform that provides shipper dashboards, end-to-end shipment visibility,
  driver and truck ratings, embedded credit and working-capital products for
  carriers, and route and load optimization across the Kobo network of
  registered drivers and trucks. Kobo360 serves large FMCG, manufacturing,
  and commodities customers including Dangote, DHL, Honeywell, Olam, and
  Unilever, and has raised funding from investors such as Goldman Sachs,
  IFC, TLcom Capital, and Western Asset. Kobo360 does not publish a public
  developer API, SDK, or open developer portal; integrations with shippers
  and partners are delivered through enterprise onboarding rather than a
  self-service API program.
